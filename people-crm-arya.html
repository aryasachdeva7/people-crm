<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People — Arya Sachdeva</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF9; --bg2: #F5F5F3; --bg3: #EEECEA;
    --border: #E2DED9; --border2: #EEECEA;
    --text: #0F0F0E; --text2: #5C514A; --text3: #A89E93;
    --accent: #B8845A; --accent-bg: #F5EDE4;
    --card: #FFFFFF; --red: #E05252; --green: #52A852;
    --shadow: rgba(15,15,14,0.07);
  }
  .dark {
    --bg: #0F0F0E; --bg2: #1A1714; --bg3: #221E1B;
    --border: #2A2520; --border2: #1E1A17;
    --text: #F5F5F3; --text2: #A89E93; --text3: #5C514A;
    --accent: #C4956A; --accent-bg: #2A1F15;
    --card: #1A1714; --red: #E07070; --green: #70B870;
    --shadow: rgba(0,0,0,0.35);
  }

  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; transition: background .2s, color .2s;
  }
  ::selection { background: var(--accent-bg); }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* LAYOUT */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg); }
  .detail { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--card); }
  .detail.hidden { display: none; }

  /* HEADER */
  .sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); background: var(--bg2); }

  /* OWNER PROFILE ROW */
  .owner-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .owner-avatar-wrap { position: relative; cursor: pointer; flex-shrink: 0; }
  .owner-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #B8845A, #8B7355);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white;
    letter-spacing: .03em;
    border: 2px solid var(--accent);
    overflow: hidden;
    transition: opacity .15s;
  }
  .owner-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .owner-avatar-overlay {
    position: absolute; inset: 0; border-radius: 50%;
    background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .15s;
  }
  .owner-avatar-wrap:hover .owner-avatar-overlay { opacity: 1; }
  .owner-info { flex: 1; min-width: 0; }
  .owner-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .owner-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .theme-btn { width: 30px; height: 30px; border: none; background: transparent; cursor: pointer; color: var(--text3); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s; }
  .theme-btn:hover { background: var(--bg3); color: var(--text2); }
  .add-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border: none; border-radius: 10px; background: var(--accent); color: white; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
  .add-btn:hover { opacity: 0.88; }
  .add-btn svg { width: 13px; height: 13px; fill: white; }

  /* SEARCH */
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  .search-icon svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
  .search-input { width: 100%; padding: 8px 10px 8px 32px; border: 1px solid transparent; border-radius: 10px; background: var(--bg3); color: var(--text); font-size: 13px; outline: none; transition: border-color .15s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text3); display: none; }
  .search-clear svg { width: 13px; height: 13px; fill: currentColor; }
  .search-clear.visible { display: flex; }

  /* SORT */
  .sort-row { display: flex; gap: 3px; padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .sort-btn { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border: none; border-radius: 6px; background: transparent; color: var(--text3); font-size: 11px; cursor: pointer; transition: background .12s, color .12s; }
  .sort-btn:hover { color: var(--text2); }
  .sort-btn.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
  .sort-btn svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2; }
  .count { margin-left: auto; font-size: 10px; color: var(--text3); padding: 3px 0; }

  /* REMINDER BANNER */
  .reminder-banner { margin: 8px 12px 0; padding: 8px 10px; border-radius: 10px; background: var(--accent-bg); display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .reminder-banner.overdue { background: rgba(224,82,82,0.1); }
  .reminder-banner svg { width: 13px; height: 13px; flex-shrink: 0; }
  .rb-name { font-size: 12px; font-weight: 500; }
  .rb-info { font-size: 10px; color: var(--accent); }
  .rb-check { margin-left: auto; padding: 4px; border: none; background: none; cursor: pointer; color: var(--text3); border-radius: 4px; }
  .rb-check:hover { color: var(--green); }
  .rb-check svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.5; }

  /* PEOPLE LIST */
  .people-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .person-item { display: flex; align-items: center; gap: 11px; padding: 10px 14px; cursor: pointer; border-radius: 12px; margin: 1px 6px; position: relative; transition: background .1s; }
  .person-item:hover { background: var(--bg2); }
  .person-item.active { background: var(--bg3); }
  .person-item.active::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2.5px; border-radius: 2px; background: var(--accent); }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; flex-shrink: 0; user-select: none; }
  .pi-info { flex: 1; min-width: 0; }
  .pi-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  .pi-role { font-size: 11px; color: var(--text3); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pi-date { font-size: 10px; color: var(--text3); flex-shrink: 0; }
  .bell-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .bell-dot.overdue { background: var(--red); }

  /* EMPTY / FOOTER */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
  .empty-emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--text3); margin-bottom: 16px; }
  .sidebar-footer { padding: 10px; text-align: center; border-top: 1px solid var(--border); }
  .kbd-hint { font-size: 10px; color: var(--text3); opacity: 0.7; font-family: monospace; }

  /* DETAIL PANEL */
  .detail-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg2); flex-shrink: 0; }
  .back-btn { display: none; padding: 5px 8px; border: none; background: none; cursor: pointer; color: var(--text3); border-radius: 8px; }
  .back-btn:hover { background: var(--bg3); }
  .back-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }
  .detail-actions { margin-left: auto; display: flex; gap: 6px; }
  .action-btn { display: flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text2); font-size: 11px; cursor: pointer; transition: all .12s; }
  .action-btn:hover { background: var(--bg3); color: var(--text); }
  .action-btn.danger:hover { background: rgba(224,82,82,0.1); color: var(--red); border-color: transparent; }
  .action-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }

  /* DELETE CONFIRM */
  .delete-bar { display: none; padding: 10px 20px; background: rgba(224,82,82,0.08); border-bottom: 1px solid rgba(224,82,82,0.2); align-items: center; gap: 10px; }
  .delete-bar.visible { display: flex; }
  .delete-bar p { font-size: 12px; color: var(--red); flex: 1; }
  .delete-cancel { font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px 8px; }
  .delete-confirm { font-size: 12px; font-weight: 500; color: white; background: var(--red); border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; }

  /* PROFILE */
  .detail-body { flex: 1; overflow-y: auto; }
  .profile-section { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .profile-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
  .profile-avatar { width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 600; color: white; flex-shrink: 0; }
  .profile-name { font-size: 20px; font-weight: 600; line-height: 1.2; }
  .profile-role { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .profile-added { font-size: 10px; color: var(--text3); margin-top: 5px; }
  .field-group { display: grid; gap: 12px; }
  .field { }
  .field-label { font-size: 9px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
  .field-value { font-size: 13px; color: var(--text2); line-height: 1.5; }
  .field-value.notes { white-space: pre-wrap; }
  .field-value.empty { color: var(--text3); font-style: italic; }

  /* EDIT MODE */
  .edit-field { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; font-size: 13px; color: var(--text); outline: none; font-family: inherit; transition: border-color .15s; }
  .edit-field:focus { border-color: var(--accent); }
  .edit-field::placeholder { color: var(--text3); }
  textarea.edit-field { resize: vertical; min-height: 70px; }
  .edit-name { font-size: 18px; font-weight: 600; }
  .edit-actions { display: flex; gap: 8px; margin-top: 14px; }
  .save-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: var(--accent); color: white; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .save-btn:hover { opacity: .88; }
  .cancel-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; transition: background .12s; }
  .cancel-btn:hover { background: var(--bg3); }

  /* SECTION BLOCKS */
  .section-block { padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .section-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-label { font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); }
  .section-add { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 3px 8px; border-radius: 6px; transition: background .12s, color .12s; }
  .section-add:hover { background: var(--bg3); color: var(--text); }
  .section-add svg { width: 11px; height: 11px; fill: none; stroke: currentColor; stroke-width: 2.5; }

  /* INTERACTIONS */
  .int-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 8px; border-radius: 10px; transition: background .1s; position: relative; }
  .int-item:hover { background: var(--bg2); }
  .int-emoji { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .int-body { flex: 1; min-width: 0; }
  .int-meta { display: flex; align-items: center; gap: 6px; }
  .int-type { font-size: 12px; font-weight: 500; }
  .int-date { font-size: 10px; color: var(--text3); }
  .int-note { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .int-del { position: absolute; right: 8px; top: 8px; opacity: 0; border: none; background: none; cursor: pointer; color: var(--text3); padding: 3px; border-radius: 5px; transition: opacity .12s, color .12s; }
  .int-item:hover .int-del { opacity: 1; }
  .int-del:hover { color: var(--red); }
  .int-del svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }
  .empty-sub-text { font-size: 12px; color: var(--text3); padding: 4px 0; }

  /* REMINDERS */
  .rem-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; background: var(--accent-bg); margin-bottom: 6px; }
  .rem-item.overdue { background: rgba(224,82,82,0.08); }
  .rem-bell svg { width: 13px; height: 13px; fill: none; stroke: var(--accent); stroke-width: 2; }
  .rem-item.overdue .rem-bell svg { stroke: var(--red); }
  .rem-body { flex: 1; }
  .rem-label { font-size: 12px; font-weight: 500; }
  .rem-date { font-size: 10px; color: var(--accent); }
  .rem-item.overdue .rem-date { color: var(--red); }
  .rem-actions { display: flex; gap: 4px; }
  .rem-done, .rem-del { background: none; border: none; cursor: pointer; color: var(--text3); padding: 3px; border-radius: 5px; }
  .rem-done:hover svg { stroke: var(--green); }
  .rem-del:hover svg { stroke: var(--red); }
  .rem-done svg, .rem-del svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.5; display: block; }

  /* ADD FORMS */
  .add-form { background: var(--bg2); border-radius: 12px; padding: 14px; margin-top: 8px; display: none; }
  .add-form.visible { display: block; }
  .form-row { margin-bottom: 10px; }
  .form-row:last-child { margin-bottom: 0; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .type-chip { padding: 5px 10px; border-radius: 20px; border: none; background: var(--card); color: var(--text2); font-size: 11px; cursor: pointer; transition: all .12s; }
  .type-chip.active { background: var(--accent); color: white; font-weight: 500; }
  .quick-dates { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .quick-date { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text2); font-size: 10px; cursor: pointer; transition: all .12s; }
  .quick-date:hover { border-color: var(--accent); color: var(--accent); }
  .form-actions { display: flex; gap: 8px; margin-top: 10px; }
  .form-submit { flex: 1; padding: 8px; border-radius: 8px; border: none; background: var(--accent); color: white; font-size: 12px; font-weight: 500; cursor: pointer; }
  .form-cancel { padding: 8px 12px; border-radius: 8px; border: none; background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; }

  /* MODAL (Add Person) */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.25); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  @media (min-width: 600px) { .modal-overlay { align-items: center; } }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 440px; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -4px 40px var(--shadow); animation: slideUp .25s cubic-bezier(.16,1,.3,1); }
  @media (min-width: 600px) { .modal { border-radius: 18px; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border2); }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { width: 28px; height: 28px; border: none; background: var(--bg3); border-radius: 50%; cursor: pointer; color: var(--text3); display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { color: var(--text); }
  .modal-close svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2.5; }
  .modal-body { padding: 18px 20px; max-height: 70vh; overflow-y: auto; }
  .modal-field { margin-bottom: 16px; }
  .modal-field:last-child { margin-bottom: 0; }
  .modal-input { width: 100%; border: none; border-bottom: 1px solid var(--border); background: transparent; padding: 6px 0 8px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; transition: border-color .15s; }
  .modal-input.name-input { font-size: 18px; font-weight: 500; }
  .modal-input:focus { border-bottom-color: var(--accent); }
  .modal-input::placeholder { color: var(--text3); }
  textarea.modal-input { resize: none; border: none; border-bottom: 1px solid var(--border); }
  .modal-footer { padding: 12px 20px 16px; display: flex; gap: 10px; }
  .modal-footer .cancel-btn { font-size: 14px; }
  .modal-footer .save-btn { font-size: 14px; }
  .modal-hint { text-align: center; font-size: 10px; color: var(--text3); opacity: .7; padding-bottom: 6px; font-family: monospace; }
  .error-msg { font-size: 11px; color: var(--red); margin-top: 4px; display: none; }
  .error-msg.visible { display: block; }

  /* DASHBOARD */
  .dash-body { flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; flex-direction: column; gap: 28px; }
  .dash-greeting { }
  .dash-greeting-time { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .dash-greeting-name { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -.02em; line-height: 1.2; }
  .dash-greeting-sub { font-size: 14px; color: var(--text3); margin-top: 5px; }

  .dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat-card { background: var(--bg2); border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 6px; cursor: default; transition: background .15s; }
  .stat-card:hover { background: var(--bg3); }
  .stat-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
  .stat-icon svg { width: 15px; height: 15px; fill: none; stroke: var(--accent); stroke-width: 2; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
  .stat-label { font-size: 11px; color: var(--text3); }

  .dash-section-title { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }

  .dash-reminders { display: flex; flex-direction: column; gap: 8px; }
  .dash-rem-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--accent-bg); border-radius: 12px; cursor: pointer; transition: opacity .15s; }
  .dash-rem-card:hover { opacity: .85; }
  .dash-rem-card.overdue { background: rgba(224,82,82,0.08); }
  .dash-rem-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; }
  .dash-rem-body { flex: 1; min-width: 0; }
  .dash-rem-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .dash-rem-info { font-size: 11px; color: var(--accent); margin-top: 1px; }
  .dash-rem-card.overdue .dash-rem-info { color: var(--red); }
  .dash-rem-tick { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; border-radius: 6px; flex-shrink: 0; }
  .dash-rem-tick:hover svg { stroke: var(--green); }
  .dash-rem-tick svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; display: block; }

  .dash-recent { display: flex; flex-direction: column; gap: 4px; }
  .dash-rec-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: background .12s; }
  .dash-rec-item:hover { background: var(--bg2); }
  .dash-rec-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: white; flex-shrink: 0; }
  .dash-rec-info { flex: 1; min-width: 0; }
  .dash-rec-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .dash-rec-role { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dash-rec-date { font-size: 10px; color: var(--text3); flex-shrink: 0; }
  .dash-rec-badge { font-size: 9px; padding: 2px 7px; border-radius: 20px; background: var(--accent-bg); color: var(--accent); font-weight: 600; flex-shrink: 0; }

  .dash-empty-cta { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; background: var(--bg2); border-radius: 16px; gap: 10px; }
  .dash-empty-cta .empty-emoji { font-size: 36px; }
  .dash-empty-cta p { font-size: 13px; color: var(--text3); max-width: 220px; line-height: 1.5; }

  /* MOBILE */
  @media (max-width: 640px) {
    .sidebar { width: 100%; border-right: none; }
    .sidebar.hidden { display: none; }
    .detail { position: fixed; inset: 0; z-index: 50; }
    .back-btn { display: flex; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <!-- ARYA PROFILE ROW -->
      <div class="owner-row">
        <div class="owner-avatar-wrap" onclick="triggerPhotoUpload()" title="Click to change photo">
          <div class="owner-avatar" id="ownerAvatar">AS</div>
          <div class="owner-avatar-overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="13" height="13"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </div>
          <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoUpload(event)" />
        </div>
        <div class="owner-info">
          <div class="owner-name">Arya Sachdeva</div>
          <div class="owner-sub">My people</div>
        </div>
        <button class="theme-btn" id="themeBtn" title="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="add-btn" onclick="openAdd()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
      <div class="search-wrap">
        <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
        <input class="search-input" id="searchInput" placeholder="Search people..." autocomplete="off" />
        <button class="search-clear" id="searchClear" onclick="clearSearch()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="sort-row">
      <button class="sort-btn active" data-sort="recent" onclick="setSort('recent')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Recent
      </button>
      <button class="sort-btn" data-sort="name" onclick="setSort('name')">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
        Name
      </button>
      <button class="sort-btn" data-sort="interaction" onclick="setSort('interaction')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Last seen
      </button>
      <span class="count" id="countLabel"></span>
    </div>
    <div id="reminderBanners"></div>
    <div class="people-list" id="peopleList"></div>
    <div class="sidebar-footer">
      <span class="kbd-hint">Ctrl+K add &nbsp;·&nbsp; / search &nbsp;·&nbsp; click photo to change it</span>
    </div>
  </div>

  <!-- HOME DASHBOARD (shown when nothing selected) -->
  <div class="detail" id="dashboard">
    <div class="dash-body" id="dashBody"></div>
  </div>

  <!-- DETAIL PANEL (shown when person selected) -->
  <div class="detail hidden" id="detail">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="detail-actions" id="detailActions">
        <button class="action-btn" onclick="startEdit()">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>
        <button class="action-btn danger" onclick="confirmDelete()">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>
    <div class="delete-bar" id="deleteBar">
      <p id="deleteMsg"></p>
      <button class="delete-cancel" onclick="cancelDelete()">Cancel</button>
      <button class="delete-confirm" onclick="deletePerson()">Delete</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<!-- ADD PERSON MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New person</span>
      <button class="modal-close" onclick="closeAdd()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <input class="modal-input name-input" id="addName" placeholder="Name" autocomplete="off" />
        <div class="error-msg" id="nameError">Name is required</div>
      </div>
      <div class="modal-field"><input class="modal-input" id="addRole" placeholder="What they do" autocomplete="off" /></div>
      <div class="modal-field"><input class="modal-input" id="addMetAt" placeholder="Where we met" autocomplete="off" /></div>
      <div class="modal-field"><input class="modal-input" id="addLiked" placeholder="What I liked about them" autocomplete="off" /></div>
      <div class="modal-field"><textarea class="modal-input" id="addNotes" placeholder="Notes" rows="3"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeAdd()">Cancel</button>
      <button class="save-btn" onclick="savePerson()">Save person</button>
    </div>
    <div class="modal-hint">Ctrl + Enter to save</div>
  </div>
</div>

<script>
// ===================== DATA LAYER =====================
const STORAGE_KEY = 'people-crm-v1';
let state = { people: [], selectedId: null, sort: 'recent', search: '', editMode: false };

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) state.people = JSON.parse(d).people || []; }
  catch(e) { state.people = []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ people: state.people })); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function avatarColor(name) {
  const colors = ['#B8845A','#8B7355','#7A8B6A','#6A7A8B','#8B6A7A','#9B8060','#6B8B7A','#8B7A6A'];
  let h = 0; for (let c of name) h = c.charCodeAt(0) + ((h << 5) - h);
  return colors[Math.abs(h) % colors.length];
}
function initials(name) { return name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase(); }

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + (d.length === 10 ? 'T12:00:00' : ''));
  const now = new Date();
  const today = now.toDateString();
  const yest = new Date(now - 86400000).toDateString();
  if (dt.toDateString() === today) return 'Today';
  if (dt.toDateString() === yest) return 'Yesterday';
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: dt.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
}
function fmtShort(d) {
  if (!d) return '';
  const dt = new Date(d + (d.length === 10 ? 'T12:00:00' : ''));
  const now = new Date();
  if (dt.toDateString() === now.toDateString()) return 'Today';
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function todayStr() { return new Date().toISOString().split('T')[0]; }
function futureDate(days) { const d = new Date(); d.setDate(d.getDate()+days); return d.toISOString().split('T')[0]; }

const INT_TYPES = [
  {v:'coffee',l:'Coffee',e:'☕'},{v:'call',l:'Call',e:'📞'},{v:'dinner',l:'Dinner',e:'🍽️'},
  {v:'event',l:'Event',e:'🎉'},{v:'followup',l:'Follow-up',e:'✉️'},{v:'message',l:'Message',e:'💬'},
  {v:'meeting',l:'Meeting',e:'🤝'},{v:'other',l:'Other',e:'·'}
];
function getIntMeta(v) { return INT_TYPES.find(t=>t.v===v) || {v,l:v,e:'·'}; }

function lastInteraction(p) {
  if (!p.interactions || !p.interactions.length) return null;
  return p.interactions.slice().sort((a,b)=>b.date.localeCompare(a.date))[0].date;
}
function upcomingReminder(p) {
  if (!p.reminders) return null;
  const active = p.reminders.filter(r=>!r.done).sort((a,b)=>a.due_date.localeCompare(b.due_date));
  return active[0] || null;
}

// ===================== SEARCH & SORT =====================
function filtered() {
  let list = [...state.people];
  const q = state.search.trim().toLowerCase();
  if (q) list = list.filter(p => [p.name,p.role,p.met_at,p.notes,p.liked].filter(Boolean).some(f=>f.toLowerCase().includes(q)));
  list.sort((a,b) => {
    if (state.sort === 'name') return a.name.localeCompare(b.name);
    if (state.sort === 'interaction') {
      const ai = lastInteraction(a) || a.created_at;
      const bi = lastInteraction(b) || b.created_at;
      return bi.localeCompare(ai);
    }
    return b.created_at.localeCompare(a.created_at);
  });
  return list;
}

function setSort(s) {
  state.sort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === s));
  renderList();
}

// ===================== DASHBOARD =====================
function greeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function renderDashboard() {
  const db = document.getElementById('dashBody');
  if (!db) return;
  const now = todayStr();
  const people = state.people;

  // Stats
  const totalPeople = people.length;
  const totalInteractions = people.reduce((s, p) => s + (p.interactions||[]).length, 0);
  const activeReminders = people.reduce((s, p) => s + (p.reminders||[]).filter(r=>!r.done).length, 0);

  // Upcoming reminders (next 30 days)
  const reminders = [];
  people.forEach(p => {
    (p.reminders||[]).filter(r=>!r.done && r.due_date <= futureDate(30)).forEach(r => {
      reminders.push({ ...r, personName: p.name, personId: p.id });
    });
  });
  reminders.sort((a,b) => a.due_date.localeCompare(b.due_date));

  // Recently added (last 5)
  const recent = [...people].sort((a,b) => b.created_at.localeCompare(a.created_at)).slice(0, 5);

  const recentHTML = recent.length ? recent.map(p => {
    const li = lastInteraction(p);
    const isNew = (Date.now() - new Date(p.created_at)) < 86400000 * 3;
    return `<div class="dash-rec-item" onclick="selectPerson('${p.id}')">
      <div class="dash-rec-avatar" style="background:${avatarColor(p.name)}">${initials(p.name)}</div>
      <div class="dash-rec-info">
        <div class="dash-rec-name">${esc(p.name)}</div>
        ${p.role ? `<div class="dash-rec-role">${esc(p.role)}</div>` : '<div class="dash-rec-role">No role added</div>'}
      </div>
      ${isNew ? `<span class="dash-rec-badge">New</span>` : `<span class="dash-rec-date">${fmtShort(li || p.created_at.split('T')[0])}</span>`}
    </div>`;
  }).join('') : `<div class="dash-empty-cta">
    <div class="empty-emoji">👋</div>
    <p>Add your first person and they'll show up here.</p>
    <button class="add-btn" onclick="openAdd()">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="white"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add someone
    </button>
  </div>`;

  const remHTML = reminders.length ? reminders.slice(0,4).map(r => {
    const over = r.due_date < now;
    return `<div class="dash-rem-card${over?' overdue':''}" onclick="selectPerson('${r.personId}')">
      <div class="dash-rem-avatar" style="background:${avatarColor(r.personName)}">${initials(r.personName)}</div>
      <div class="dash-rem-body">
        <div class="dash-rem-name">${esc(r.personName)}</div>
        <div class="dash-rem-info">${esc(r.label)} &middot; ${over?'Overdue &middot; ':''}${fmtDate(r.due_date)}</div>
      </div>
      <button class="dash-rem-tick" onclick="event.stopPropagation();markReminderDone('${r.personId}','${r.id}');renderDashboard();" title="Mark done">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>`;
  }).join('') : `<p style="font-size:13px;color:var(--text3)">No upcoming reminders. You're all caught up.</p>`;

  db.innerHTML = `
    <div class="dash-greeting">
      <div class="dash-greeting-time">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      <div class="dash-greeting-name">${greeting()}, Arya.</div>
      <div class="dash-greeting-sub">${totalPeople === 0 ? "Start building your network." : `You know ${totalPeople} ${totalPeople===1?'person':'people'}.`}</div>
    </div>

    <div class="dash-stats">
      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        <div class="stat-num">${totalPeople}</div>
        <div class="stat-label">People</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <div class="stat-num">${totalInteractions}</div>
        <div class="stat-label">Interactions</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
        <div class="stat-num">${activeReminders}</div>
        <div class="stat-label">Reminders</div>
      </div>
    </div>

    ${reminders.length ? `<div>
      <div class="dash-section-title">Coming up</div>
      <div class="dash-reminders">${remHTML}</div>
    </div>` : ''}

    <div>
      <div class="dash-section-title">${recent.length ? 'Recently added' : 'Your people'}</div>
      <div class="dash-recent">${recentHTML}</div>
    </div>
  `;
}

// ===================== RENDER =====================
function renderAll() { renderDashboard(); renderBanners(); renderList(); if (state.selectedId) renderDetail(); }

function renderBanners() {
  const container = document.getElementById('reminderBanners');
  const now = todayStr();
  const reminders = [];
  state.people.forEach(p => {
    const r = upcomingReminder(p);
    if (r && r.due_date <= futureDate(30)) reminders.push({ ...r, personName: p.name, personId: p.id });
  });
  reminders.sort((a,b) => a.due_date.localeCompare(b.due_date));
  if (!reminders.length) { container.innerHTML = ''; return; }
  container.innerHTML = reminders.slice(0,3).map(r => {
    const over = r.due_date < now;
    return `<div class="reminder-banner${over?' overdue':''}" onclick="selectPerson('${r.personId}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="${over?'var(--red)':'var(--accent)'}" stroke-width="2" width="13" height="13"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div style="flex:1;min-width:0">
        <div class="rb-name">${esc(r.personName)}</div>
        <div class="rb-info" style="${over?'color:var(--red)':''}">${esc(r.label)} · ${over?'Overdue · ':''}${fmtDate(r.due_date)}</div>
      </div>
      <button class="rb-check" onclick="event.stopPropagation();markReminderDone('${r.personId}','${r.id}')">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
    </div>`;
  }).join('');
}

function renderList() {
  const list = filtered();
  const container = document.getElementById('peopleList');
  const count = document.getElementById('countLabel');
  count.textContent = list.length + (list.length === 1 ? ' person' : ' people');

  if (!list.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-emoji">${state.search ? '🔍' : '👋'}</div>
      <div class="empty-title">${state.search ? 'No results' : 'Add your first person'}</div>
      <div class="empty-sub">${state.search ? `Nothing matches "${esc(state.search)}"` : 'Keep track of people you meet.'}</div>
      ${state.search ? `<button class="add-btn" onclick="clearSearch()">Clear search</button>` : `<button class="add-btn" onclick="openAdd()"><svg viewBox="0 0 24 24" width="13" height="13" fill="white"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add someone</button>`}
    </div>`;
    return;
  }

  container.innerHTML = list.map(p => {
    const li = lastInteraction(p);
    const r = upcomingReminder(p);
    const over = r && r.due_date < todayStr();
    return `<div class="person-item${state.selectedId===p.id?' active':''}" onclick="selectPerson('${p.id}')">
      <div class="avatar" style="background:${avatarColor(p.name)}">${initials(p.name)}</div>
      <div class="pi-info">
        <div class="pi-name">
          ${esc(p.name)}
          ${r ? `<span class="bell-dot${over?' overdue':''}"></span>` : ''}
        </div>
        ${p.role ? `<div class="pi-role">${esc(p.role)}</div>` : ''}
      </div>
      <div class="pi-date">${fmtShort(li || p.created_at.split('T')[0])}</div>
    </div>`;
  }).join('');
}

function renderDetail() {
  const p = state.people.find(x => x.id === state.selectedId);
  if (!p) { closeDetail(); return; }

  const body = document.getElementById('detailBody');
  const deleteBar = document.getElementById('deleteBar');
  deleteBar.classList.remove('visible');

  if (state.editMode) { renderEditMode(p); return; }

  const li = lastInteraction(p);
  const ints = (p.interactions || []).slice().sort((a,b) => b.date.localeCompare(a.date) || b.created_at.localeCompare(a.created_at));
  const rems = (p.reminders || []).filter(r=>!r.done).sort((a,b)=>a.due_date.localeCompare(b.due_date));

  body.innerHTML = `
    <div class="profile-section">
      <div class="profile-top">
        <div class="profile-avatar" style="background:${avatarColor(p.name)}">${initials(p.name)}</div>
        <div>
          <div class="profile-name">${esc(p.name)}</div>
          ${p.role ? `<div class="profile-role">${esc(p.role)}</div>` : ''}
          <div class="profile-added">Added ${fmtDate(p.created_at.split('T')[0])}</div>
        </div>
      </div>
      <div class="field-group">
        ${p.met_at ? `<div class="field"><div class="field-label">Where we met</div><div class="field-value">${esc(p.met_at)}</div></div>` : ''}
        ${p.liked ? `<div class="field"><div class="field-label">What I liked</div><div class="field-value">${esc(p.liked)}</div></div>` : ''}
        <div class="field"><div class="field-label">Notes</div>
          <div class="field-value notes${!p.notes?' empty':''}">${p.notes ? esc(p.notes) : 'None'}</div>
        </div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-top">
        <span class="section-label">Interactions</span>
        <button class="section-add" onclick="toggleIntForm('${p.id}')">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Log one
        </button>
      </div>
      <div id="intForm" class="add-form"></div>
      ${!ints.length ? '<p class="empty-sub-text">No interactions yet.</p>' : ints.map(i => {
        const m = getIntMeta(i.type);
        return `<div class="int-item">
          <div class="int-emoji">${m.e}</div>
          <div class="int-body">
            <div class="int-meta"><span class="int-type">${m.l}</span><span class="int-date">${fmtDate(i.date)}</span></div>
            ${i.note ? `<div class="int-note">${esc(i.note)}</div>` : ''}
          </div>
          <button class="int-del" onclick="deleteInteraction('${p.id}','${i.id}')">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>`;
      }).join('')}
    </div>

    <div class="section-block">
      <div class="section-top">
        <span class="section-label">Reminders</span>
        <button class="section-add" onclick="toggleRemForm('${p.id}')">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add
        </button>
      </div>
      <div id="remForm" class="add-form"></div>
      ${!rems.length ? '<p class="empty-sub-text">No reminders set.</p>' : rems.map(r => {
        const over = r.due_date < todayStr();
        return `<div class="rem-item${over?' overdue':''}">
          <div class="rem-bell"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
          <div class="rem-body">
            <div class="rem-label">${esc(r.label)}</div>
            <div class="rem-date">${over?'Overdue · ':''}${fmtDate(r.due_date)}</div>
          </div>
          <div class="rem-actions">
            <button class="rem-done" onclick="markReminderDone('${p.id}','${r.id}')" title="Done"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button>
            <button class="rem-del" onclick="deleteReminder('${p.id}','${r.id}')" title="Delete"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderEditMode(p) {
  const body = document.getElementById('detailBody');
  body.innerHTML = `
    <div class="profile-section">
      <div class="profile-top" style="margin-bottom:0">
        <div class="profile-avatar" style="background:${avatarColor(p.name)}">${initials(p.name)}</div>
        <div style="flex:1">
          <input class="edit-field edit-name" id="eName" value="${esc(p.name)}" placeholder="Name" />
          <input class="edit-field" id="eRole" value="${esc(p.role||'')}" placeholder="What they do" style="margin-top:8px" />
        </div>
      </div>
      <div style="margin-top:16px;display:grid;gap:10px">
        <div>
          <div class="field-label">Where we met</div>
          <input class="edit-field" id="eMetAt" value="${esc(p.met_at||'')}" placeholder="Where we met" />
        </div>
        <div>
          <div class="field-label">What I liked</div>
          <input class="edit-field" id="eLiked" value="${esc(p.liked||'')}" placeholder="What you liked about them" />
        </div>
        <div>
          <div class="field-label">Notes</div>
          <textarea class="edit-field" id="eNotes" rows="4" placeholder="Notes">${esc(p.notes||'')}</textarea>
        </div>
      </div>
      <div class="edit-actions">
        <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
        <button class="save-btn" onclick="saveEdit('${p.id}')">Save changes</button>
      </div>
    </div>
  `;
  document.getElementById('eName').focus();
}

// ===================== ACTIONS =====================
function selectPerson(id) {
  state.selectedId = id;
  state.editMode = false;
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('detail').classList.remove('hidden');
  document.getElementById('sidebar').classList.toggle('hidden', window.innerWidth < 641);
  renderList();
  renderDetail();
}

function closeDetail() {
  state.selectedId = null;
  state.editMode = false;
  document.getElementById('detail').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  renderDashboard();
  renderList();
}

function startEdit() { state.editMode = true; renderDetail(); }
function cancelEdit() { state.editMode = false; renderDetail(); }

function saveEdit(id) {
  const p = state.people.find(x => x.id === id);
  const name = document.getElementById('eName').value.trim();
  if (!name) { document.getElementById('eName').focus(); return; }
  p.name = name;
  p.role = document.getElementById('eRole').value.trim();
  p.met_at = document.getElementById('eMetAt').value.trim();
  p.liked = document.getElementById('eLiked').value.trim();
  p.notes = document.getElementById('eNotes').value.trim();
  p.updated_at = new Date().toISOString();
  save(); state.editMode = false; renderAll();
}

function confirmDelete() {
  const p = state.people.find(x => x.id === state.selectedId);
  if (!p) return;
  document.getElementById('deleteMsg').textContent = `Delete ${p.name}? This can't be undone.`;
  document.getElementById('deleteBar').classList.add('visible');
}
function cancelDelete() { document.getElementById('deleteBar').classList.remove('visible'); }
function deletePerson() {
  state.people = state.people.filter(p => p.id !== state.selectedId);
  state.selectedId = null;
  save(); document.getElementById('detail').classList.add('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  renderAll();
}

// INTERACTIONS
let intFormVisible = false;
function toggleIntForm(personId) {
  const f = document.getElementById('intForm');
  intFormVisible = !intFormVisible;
  if (!intFormVisible) { f.classList.remove('visible'); return; }
  f.classList.add('visible');
  f.innerHTML = `
    <div class="chip-row" id="intChips">${INT_TYPES.map((t,i) =>
      `<button class="type-chip${i===0?' active':''}" onclick="selectChip(this,'intType','${t.v}')">${t.e} ${t.l}</button>`
    ).join('')}</div>
    <input type="hidden" id="intType" value="coffee" />
    <div class="form-row"><input class="edit-field" type="date" id="intDate" value="${todayStr()}" /></div>
    <div class="form-row"><input class="edit-field" id="intNote" placeholder="Quick note (optional)" /></div>
    <div class="form-actions">
      <button class="form-cancel" onclick="toggleIntForm('${personId}')">Cancel</button>
      <button class="form-submit" onclick="addInteraction('${personId}')">Log interaction</button>
    </div>
  `;
  document.getElementById('intNote').focus();
}
function selectChip(btn, hiddenId, val) {
  btn.closest('.chip-row').querySelectorAll('.type-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(hiddenId).value = val;
}
function addInteraction(personId) {
  const p = state.people.find(x => x.id === personId);
  const type = document.getElementById('intType').value;
  const date = document.getElementById('intDate').value || todayStr();
  const note = document.getElementById('intNote').value.trim();
  if (!p.interactions) p.interactions = [];
  p.interactions.push({ id: uid(), type, date, note, created_at: new Date().toISOString() });
  p.updated_at = new Date().toISOString();
  intFormVisible = false; save(); renderAll();
}
function deleteInteraction(personId, intId) {
  const p = state.people.find(x => x.id === personId);
  if (p) { p.interactions = (p.interactions||[]).filter(i=>i.id!==intId); save(); renderAll(); }
}

// REMINDERS
let remFormVisible = false;
function toggleRemForm(personId) {
  const f = document.getElementById('remForm');
  remFormVisible = !remFormVisible;
  if (!remFormVisible) { f.classList.remove('visible'); return; }
  f.classList.add('visible');
  f.innerHTML = `
    <div class="form-row"><input class="edit-field" id="remLabel" value="Follow up" placeholder="Label" /></div>
    <div class="quick-dates">
      <button class="quick-date" onclick="setQuickDate(7,'Follow up')">Follow up</button>
      <button class="quick-date" onclick="setQuickDate(14,'Check in')">Check in</button>
      <button class="quick-date" onclick="setQuickDate(30,'Next month')">Next month</button>
      <button class="quick-date" onclick="setQuickDate(90,'In 3 months')">In 3 months</button>
    </div>
    <div class="form-row"><input class="edit-field" type="date" id="remDate" min="${todayStr()}" /></div>
    <div class="form-actions">
      <button class="form-cancel" onclick="toggleRemForm('${personId}')">Cancel</button>
      <button class="form-submit" onclick="addReminder('${personId}')">Set reminder</button>
    </div>
  `;
}
function setQuickDate(days, label) {
  document.getElementById('remDate').value = futureDate(days);
  document.getElementById('remLabel').value = label;
}
function addReminder(personId) {
  const p = state.people.find(x => x.id === personId);
  const label = document.getElementById('remLabel').value.trim() || 'Follow up';
  const due_date = document.getElementById('remDate').value;
  if (!due_date) { document.getElementById('remDate').focus(); return; }
  if (!p.reminders) p.reminders = [];
  p.reminders.push({ id: uid(), label, due_date, done: false, created_at: new Date().toISOString() });
  remFormVisible = false; save(); renderAll();
}
function markReminderDone(personId, remId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  const r = (p.reminders||[]).find(r=>r.id===remId);
  if (r) { r.done = true; save(); renderAll(); }
}
function deleteReminder(personId, remId) {
  const p = state.people.find(x => x.id === personId);
  if (p) { p.reminders = (p.reminders||[]).filter(r=>r.id!==remId); save(); renderAll(); }
}

// ADD PERSON MODAL
function openAdd() {
  document.getElementById('modalOverlay').classList.add('visible');
  ['addName','addRole','addMetAt','addLiked','addNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('nameError').classList.remove('visible');
  setTimeout(() => document.getElementById('addName').focus(), 80);
}
function closeAdd() { document.getElementById('modalOverlay').classList.remove('visible'); }
function handleOverlayClick(e) { if (e.target === e.currentTarget) closeAdd(); }
function savePerson() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { document.getElementById('nameError').classList.add('visible'); document.getElementById('addName').focus(); return; }
  const p = {
    id: uid(), name,
    role: document.getElementById('addRole').value.trim(),
    met_at: document.getElementById('addMetAt').value.trim(),
    liked: document.getElementById('addLiked').value.trim(),
    notes: document.getElementById('addNotes').value.trim(),
    interactions: [], reminders: [],
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString(),
  };
  state.people.unshift(p);
  save(); closeAdd(); state.selectedId = p.id; renderAll();
}

// SEARCH
document.getElementById('searchInput').addEventListener('input', function() {
  state.search = this.value;
  document.getElementById('searchClear').classList.toggle('visible', !!this.value);
  renderList();
});
function clearSearch() {
  state.search = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  renderList();
  document.getElementById('searchInput').focus();
}

// THEME
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  const icon = document.getElementById('themeIcon');
  icon.innerHTML = dark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}
document.getElementById('themeBtn').addEventListener('click', () => {
  applyTheme(!document.body.classList.contains('dark'));
});

// KEYBOARD SHORTCUTS
document.addEventListener('keydown', e => {
  const modal = document.getElementById('modalOverlay').classList.contains('visible');
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openAdd(); return; }
  if (modal && (e.ctrlKey || e.metaKey) && e.key === 'Enter') { savePerson(); return; }
  if (modal && e.key === 'Escape') { closeAdd(); return; }
  if (!modal && e.key === 'Escape' && state.selectedId) { closeDetail(); return; }
  if (!modal && e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault(); document.getElementById('searchInput').focus();
  }
});

// ESCAPE strings
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// SEED DATA (first load only)
function seedIfEmpty() {
  if (state.people.length) return;
  const sample = [
    { name: 'Priya Mehta', role: 'Product designer at Figma', met_at: 'Config 2026 after-party', liked: 'Thinks in systems, incredibly precise', notes: 'Moving to NYC in September. Wants to collaborate on a design systems talk.',
      interactions: [{ id: uid(), type: 'coffee', date: '2026-07-19', note: 'Caught up on her Figma AI work. Ships Q3.', created_at: new Date().toISOString() }, { id: uid(), type: 'call', date: '2026-06-04', note: 'Intro call. Felt like we knew each other for years.', created_at: new Date().toISOString() }],
      reminders: [{ id: uid(), label: 'Follow up after launch', due_date: '2026-08-15', done: false, created_at: new Date().toISOString() }] },
    { name: 'James Kim', role: 'Partner at Sequoia', met_at: 'YC Demo Day', liked: 'Asks questions no one else thinks to ask', notes: 'Interested in health-tech. Warm intro from Saurav.',
      interactions: [{ id: uid(), type: 'meeting', date: '2026-07-15', note: 'Quick 20 min intro.', created_at: new Date().toISOString() }],
      reminders: [] },
    { name: 'Aiko Suzuki', role: 'Research scientist at DeepMind', met_at: 'NeurIPS dinner', liked: 'Calm, deep thinker, brilliant on RL',
      interactions: [], reminders: [] },
  ];
  sample.forEach(s => {
    const now = new Date().toISOString();
    state.people.push({ id: uid(), ...s, created_at: now, updated_at: now });
  });
  save();
}

// ===================== PHOTO UPLOAD =====================
function triggerPhotoUpload() { document.getElementById('photoInput').click(); }
function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const dataUrl = ev.target.result;
    localStorage.setItem('arya-photo', dataUrl);
    applyOwnerPhoto(dataUrl);
  };
  reader.readAsDataURL(file);
}
function applyOwnerPhoto(dataUrl) {
  const el = document.getElementById('ownerAvatar');
  if (!el) return;
  el.innerHTML = dataUrl
    ? `<img src="${dataUrl}" alt="Arya Sachdeva" />`
    : 'AS';
}
function loadOwnerPhoto() {
  const saved = localStorage.getItem('arya-photo');
  if (saved) applyOwnerPhoto(saved);
}

// INIT
(function() {
  const stored = localStorage.getItem('theme');
  const dark = stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
  applyTheme(dark);
  load(); seedIfEmpty(); loadOwnerPhoto(); renderAll();
})();
</script>
